<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperMercado TI - Chamados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260407-2">
  <script>
    window.APP_ASSET_VERSION = '20260407-2';
  </script>
</head>
<body>
  <div id="toast-container"></div>
  <dialog id="toast-dialog" class="toast-dialog">
    <section id="toast-dialog-body" class="toast-dialog-body"></section>
  </dialog>

  <main id="auth-view" class="auth-shell hidden">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/logomartree.png" alt="Logo Martree" class="auth-logo" />
        <div>
          <h1>Suporte Martree</h1>
          <p>Painel de chamados</p>
        </div>
      </div>
      <form id="login-form" class="form-grid">
        <label>Email
          <input type="email" id="login-email" required placeholder="seu@email.com" />
        </label>
        <label>Senha
          <input type="password" id="login-password" required minlength="6" placeholder="******" />
        </label>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>
      <div class="auth-actions">
        <button id="btn-go-register" class="btn btn-ghost">Criar conta</button>
      </div>

      <form id="register-form" class="form-grid hidden">
        <h2>Novo usuário</h2>
        <label>Nome
          <input type="text" id="register-name" required />
        </label>
        <label>Email
          <input type="email" id="register-email" required />
        </label>
        <label>Telefone / WhatsApp
          <input type="tel" id="register-phone" required placeholder="5599999999999" />
        </label>
        <label>Senha
          <input type="password" id="register-password" required minlength="6" />
        </label>
        <label>Perfil
          <input value="Funcionário" disabled />
        </label>
        <label>Loja*
          <select id="register-store" required></select>
        </label>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
        <button type="button" id="btn-go-login" class="btn btn-ghost">Voltar para login</button>
      </form>
    </section>
  </main>

  <main id="app-view" class="app-shell hidden">
    <aside class="sidebar" id="sidebar" aria-label="Navegação principal">
      <button id="btn-nav-close" class="btn btn-ghost btn-sm sidebar-close" type="button" aria-label="Fechar menu de navegação">Fechar</button>
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">
          <img src="assets/logomartree.png" alt="Logo Martree" class="brand-logo-img" />
        </div>
        <div class="brand-copy">
          <h2>Suporte Martree</h2>
          <small>Painel de chamados</small>
        </div>
      </div>
      <nav id="menu-nav"></nav>
      <div class="quick-actions">
        <button id="btn-admin-quick" class="btn btn-ghost btn-sm">Admin</button>
        <button id="btn-theme-toggle" class="btn btn-ghost btn-sm">Tema</button>
        <button id="btn-logout" class="btn btn-danger btn-sm" type="button">Sair</button>
      </div>
    </aside>
    <div id="nav-overlay" class="nav-overlay" aria-hidden="true"></div>

    <section class="main-panel">
      <header class="topbar">
        <div class="topbar-left">
          <button id="btn-nav-toggle" class="btn btn-ghost btn-sm" type="button" aria-controls="sidebar" aria-expanded="false">Menu</button>
          <div class="topbar-title-group">
            <h1 id="view-title">Dashboard</h1>
            <p id="user-info"></p>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="search-shell">
            <input id="global-search" placeholder="Buscar por número do chamado" />
          </div>
          <button id="btn-open-ticket" class="btn btn-primary">Novo chamado</button>
        </div>
      </header>

      <section id="content"></section>
    </section>
  </main>

  <dialog id="ticket-modal" class="modal">
    <form id="ticket-form" class="modal-body">
      <h2>Abrir chamado</h2>
      <div class="grid-2">
        <label>Loja*
          <select id="ticket-store" required></select>
        </label>
        <label>Equipamentos/Setor*
          <select id="ticket-checkout" required></select>
        </label>
      </div>
      <div class="grid-2">
        <label>Tipo*
          <select id="ticket-type" required></select>
        </label>
      </div>
      <label>Título*
        <input id="ticket-title" required maxlength="120" />
      </label>
      <label>Descrição detalhada*
        <textarea id="ticket-description" rows="4" required></textarea>
      </label>
      <label>Anexo URL
        <input id="ticket-attachment" placeholder="https://..." />
      </label>
      <div class="form-note form-note-warning">
        Envio obrigatório no WhatsApp. O chamado só será salvo quando você clicar em Abrir chamado.
      </div>
      <footer class="modal-footer">
        <button type="button" id="btn-close-ticket" class="btn btn-ghost btn-sm">Cancelar</button>
        <button type="submit" class="btn btn-primary btn-sm">Abrir Chamado</button>
      </footer>
    </form>
  </dialog>

  <dialog id="details-modal" class="modal">
    <section class="modal-body" id="details-content"></section>
  </dialog>

  <dialog id="custom-dialog" class="modal modal-compact">
    <form id="custom-dialog-form" class="modal-body custom-dialog-body">
      <header class="custom-dialog-header">
        <h2 id="custom-dialog-title">Confirmar ação</h2>
        <p id="custom-dialog-message" class="custom-dialog-message hidden"></p>
      </header>
      <section id="custom-dialog-fields" class="form-grid custom-dialog-fields"></section>
      <footer class="modal-footer">
        <button type="button" id="custom-dialog-cancel" class="btn btn-ghost btn-sm">Cancelar</button>
        <button type="submit" id="custom-dialog-confirm" class="btn btn-primary btn-sm">Confirmar</button>
      </footer>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function loadLocalScriptsSequentially() {
      const localScripts = ['config.js', 'supabase.js', 'app.js'];

      function loadScript(index) {
        if (index >= localScripts.length) return;

        const script = document.createElement('script');
        script.src = `${localScripts[index]}?v=${window.APP_ASSET_VERSION}`;
        script.onload = function () {
          loadScript(index + 1);
        };
        document.body.appendChild(script);
      }

      loadScript(0);
    })();
  </script>
</body>
</html>
